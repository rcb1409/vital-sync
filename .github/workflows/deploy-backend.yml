name: Deploy Backend to Amazon ECS

on:
  push:
    branches: [ "main" ]
    paths:
      - 'server/**' # ONLY run when backend code changes!

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # OIDC: Grant this job permission to request a short-lived AWS identity token
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials (OIDC — No stored keys!)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: vitalsync-backend
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd server
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Download current ECS Task Definition
      id: download-task-def
      run: |
        aws ecs describe-task-definition \
          --task-definition production-vitalsync-api \
          --query taskDefinition > task-definition.json

    - name: Inject new Docker image into Task Definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: vitalsync-api
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy updated Task Definition to ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: production-vitalsync-api
        cluster: production-vitalsync-cluster
        wait-for-service-stability: true
